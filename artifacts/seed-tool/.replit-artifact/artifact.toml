kind = "web"
previewPath = "/"
title = "SeedXOR Mnemonic Tool"
version = "1.0.0"
id = "artifacts/seed-tool"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21267

[services.development]
run = "pnpm --filter @workspace/seed-tool run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/seed-tool", "run", "build" ]
publicDir = "artifacts/seed-tool/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21267"
BASE_PATH = "/"
